<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - OTT MASTER</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-color: #0e0e11;
            --primary: #df8eff;
            --secondary: #00e3fd;
            --surface: rgba(255, 255, 255, 0.05);
            --glass-blur: blur(25px);
            --text-main: #f0edf1;
            --text-dim: #acaaae;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 90%;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(14, 14, 17, 0.8) 0%, transparent 100%);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            height: 50px;
            text-decoration: none;
        }
        .logo img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .search-bar {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 25px;
            width: 400px;
            backdrop-filter: var(--glass-blur);
            display: flex;
            align-items: center;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            margin-left: 10px;
            font-size: 1rem;
        }

        .container {
            padding: 120px 5% 50px 5%;
            min-height: 70vh;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
        }

        .section-title span {
            color: var(--primary);
            margin-left: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        /* --- Glass Cards --- */
        .card {
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            backdrop-filter: var(--glass-blur);
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(223, 142, 255, 0.15);
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* --- Hover Overlay (PiP) --- */
        .card-img-wrapper {
            position: relative;
            display: block;
            overflow: hidden;
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(14, 14, 17, 0.85);
            color: #fff;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .card-overlay p {
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 8;
            line-clamp: 8;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: normal;
        }

        .card-info {
            padding: 20px;
        }

        .card-info h4 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-results {
            text-align: center;
            padding: 100px 0;
            font-size: 1.5rem;
            color: var(--text-dim);
        }

        /* --- Provider/Premium Modal --- */
        .ott-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }
        .ott-modal.show {
            display: flex;
        }
        .ott-modal-content {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 85%;
            max-width: 480px;
            text-align: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            animation: modalFadeIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: var(--glass-blur);
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 32px;
            font-weight: 300;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

    </style>
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
</head>

<body>

    <header>
        <a href="index.html" class="logo">
            <img src="assets/dong_a_logo.png?v=3" alt="Dong-A OTT MASTER">
        </a>
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="다른 작품들도 검색해 보세요!">
        </div>
        <div>
            <a href="index.html" style="color: white; text-decoration: none; font-weight: 700;">&larr; 홈으로 돌아가기</a>
        </div>
    </header>

    <div class="container">
        <div class="section-title" id="pageTitle">검색 중... <span></span></div>
        <div id="search-grid" class="grid">
            <!-- JS will inject search results here -->
        </div>
    </div>

    <footer
        style="padding: 50px 5%; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; color: var(--text-dim); font-size: 0.9rem; margin-top: 50px;">
        &copy; 2026 OTT MASTER - Search. Produced by Mango special agent.
    </footer>

    <script>
        const TMDB_API_KEY = "081adf5e23f22ccc0cfd852dde315657";

        // URL 파라미터에서 검색어 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');

        // 상단 바 검색 기능
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.value = query || ''; // 기존 검색어 유지
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const newQuery = e.target.value.trim();
                    if (newQuery) {
                        window.location.href = `search.html?q=${encodeURIComponent(newQuery)}`;
                    }
                }
            });
        }

        async function fetchSearchResults() {
            const pageTitle = document.getElementById('pageTitle');
            const grid = document.getElementById('search-grid');

            if (!query) {
                pageTitle.innerHTML = '검색어를 입력해 주세요!';
                return;
            }

            pageTitle.innerHTML = `"${query}" <span>검색 결과</span>`;

            try {
                // 한국어 및 영어 데이터 병합 요청
                const resKO = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=ko-KR&page=1`);
                const dataKO = await resKO.json();

                const resEN = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=en-US&page=1`);
                const dataEN = await resEN.json();

                if (!dataKO.results || dataKO.results.length === 0) {
                    grid.innerHTML = `<div class="no-results">"${query}"에 대한 검색 결과가 없습니다. 😢</div>`;
                    return;
                }

                // 한자 감지 함수
                const isChinese = (str) => /[\u4e00-\u9fa5]/.test(str);

                const mergedResults = dataKO.results.map((item, idx) => {
                    const enItem = dataEN.results && dataEN.results[idx] ? dataEN.results[idx] : item;
                    let finalTitle = item.name || item.title;
                    let enTitle = enItem.name || enItem.title;

                    // 병합: 제목
                    if (isChinese(finalTitle) && enTitle && !isChinese(enTitle)) {
                         finalTitle = `${finalTitle} (${enTitle})`; 
                    }

                    // 병합: 줄거리 (한국어 없으면 영어로 대체)
                    let finalOverview = item.overview;
                    if (!finalOverview || finalOverview.trim() === '') {
                        finalOverview = enItem.overview;
                    }
                    
                    return {...item, mergedTitle: finalTitle, overview: finalOverview};
                }).filter(item => item.poster_path); // 이미지가 있는 것만

                if (mergedResults.length === 0) {
                    grid.innerHTML = `<div class="no-results">"${query}"에 대한 관련 이미지를 찾을 수 없습니다. 😢</div>`;
                    return;
                }

                renderSearchGrid(grid, mergedResults);

            } catch (error) {
                console.error("검색 중 오류 발생:", error);
                grid.innerHTML = `<div class="no-results">검색 결과를 불러오는 데 실패했습니다. 잠시 후 다시 시도해 주세요.</div>`;
            }
        }

        function renderSearchGrid(container, items) {
            let html = items.map(item => {
                const title = item.mergedTitle;
                const imgUrl = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                
                // 검색 결과 클릭 시 넷플릭스로 딥링크 연결 시도 
                // (아이치이는 검색 쿼리를 판단하기 복잡하므로 K-드라마처럼 기본적으로 넷플릭스 검색으로 유도)
                const link = `https://www.netflix.com/search?q=${encodeURIComponent(item.name || item.title)}`;

                return `
                <div class="card">
                    <a href="${link}" target="_blank" onclick="checkPremiumAndRedirect(event, this.href)" class="card-img-wrapper">
                        <img src="${imgUrl}" alt="${title}">
                        <div class="card-overlay">
                            <p>${item.overview ? item.overview : '줄거리 정보가 제공되지 않았습니다.'}</p>
                        </div>
                    </a>
                    <div class="card-info">
                        <a href="${link}" target="_blank" onclick="checkPremiumAndRedirect(event, this.href)" style="text-decoration: none; color: inherit;">
                            <h4 title="${title}">${title}</h4>
                        </a>
                        <!-- 태그 생략 (통합 검색 결과) -->
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        // 수익화(Monetization) & PayPal 결제 로직
        window.isPremiumUser = false;
        let pendingUrl = '';

        function checkPremiumAndRedirect(event, url) {
            if (!window.isPremiumUser) {
                if(event) {
                    event.preventDefault(); // 다이렉트 이동 막기
                }
                pendingUrl = url;
                const premiumModal = document.getElementById('premiumModal');
                if (premiumModal) {
                    premiumModal.classList.add('show');
                }
            } else {
                // 정상적으로 넘어감
            }
        }

        function closePremiumModal() {
            document.getElementById('premiumModal').classList.remove('show');
        }

        function initPayPal() {
            if(window.paypal && document.getElementById('paypal-button-container') && document.getElementById('paypal-button-container').innerHTML === '') {
                paypal.Buttons({
                    createOrder: function(data, actions) {
                        return actions.order.create({
                            purchase_units: [{
                                amount: {
                                    value: '9.99' // 1개월 프리미엄 패스 요금
                                },
                                description: 'OTT Master Premium Pass (1 Month)'
                            }]
                        });
                    },
                    onApprove: function(data, actions) {
                        return actions.order.capture().then(function(details) {
                            alert('결제가 완료되었습니다, ' + details.payer.name.given_name + '님! 프리미엄 콘텐츠를 즐겨보세요.');
                            closePremiumModal();
                            window.isPremiumUser = true;

                            if (pendingUrl && pendingUrl !== '#') {
                                window.open(pendingUrl, '_blank');
                                pendingUrl = '';
                            }
                        });
                    },
                    onError: function(err) {
                        console.error('PayPal Error:', err);
                        alert('결제 처리 중 오류가 발생했습니다. 다시 시도해 주세요.');
                    }
                }).render('#paypal-button-container');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchSearchResults();
            initPayPal();
        });
    </script>
    <!-- Premium Pass Modal -->
    <div id="premiumModal" class="ott-modal">
        <div class="ott-modal-content" style="max-width: 420px; padding: 40px; background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(223, 142, 255, 0.2);">
            <span class="close-modal" onclick="closePremiumModal()">&times;</span>
            <h2 style="margin-top: 0; font-weight: 900; font-size: 2rem; color: var(--text-main); letter-spacing: -1px;">
                OTT <span style="color: var(--primary);">MASTER</span><br>PREMIUM PASS
            </h2>
            <p style="color: var(--text-dim); line-height: 1.6; margin-bottom: 25px;">
                검색된 모든 작품의 무제한 4K 스트리밍과 글로벌 동시 방영작을<br>
                광고 없이 즐기세요.
            </p>
            
            <div style="background: rgba(223, 142, 255, 0.05); border: 1px solid rgba(223, 142, 255, 0.3); border-radius: 16px; padding: 25px; margin-bottom: 30px;">
                <h3 style="margin: 0 0 10px 0; color: var(--text-dim); font-size: 1rem; font-weight: 500;">프리미엄 1개월 이용권</h3>
                <h1 style="margin: 0; font-size: 3rem; color: var(--primary); font-weight: 800;">$9.99</h1>
            </div>

            <div id="paypal-button-container" style="min-height: 150px; display: flex; align-items:center; justify-content:center;">
                <!-- PayPal Buttons Rendered Here -->
            </div>
            
            <p style="color: #666; font-size: 0.8rem; margin-top: 20px;">
                * 안전한 페이팔(PayPal) 체크아웃을 통해 결제됩니다.<br>
                결제 시 테스트 계정으로 진행 시 실제 요금이 청구되지 않습니다.
            </p>
        </div>
    </div>
</body>

</html>
